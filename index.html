<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant Chantier</title>
<link rel="icon" type="image/png" href="https://ibb.co/mCNfhjVw">
<link rel="apple-touch-icon" href="https://ibb.co/mCNfhjVw">
<meta name="theme-color" content="#d4900a">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f4f5f7; --surface: #ffffff; --surface2: #eef0f4; --border: #d0d4e0; --accent: #d4900a; --text: #1a1d2e; --muted: #7a80a0; --green: #2a9e60; --red: #cc4a1a; --blue: #2a7edc; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  #syncBar { position: fixed; top: 0; left: 0; right: 0; z-index: 999; height: 3px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform .3s; }
  #syncBar.active { transform: scaleX(1); }
  #syncStatus { position: fixed; bottom: 16px; right: 16px; font-family: 'IBM Plex Mono', monospace; font-size: .72rem; padding: 6px 12px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); z-index: 500; transition: opacity .3s; }
  #syncStatus.ok { color: var(--green); border-color: var(--green); }
  #syncStatus.err { color: var(--red); border-color: var(--red); }
  #loadingScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 900; }
  #loadingScreen h2 { font-size: 1.1rem; color: var(--accent); }
  #loadingScreen p { font-size: .82rem; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: .04em; color: var(--accent); text-transform: uppercase; }
  header span { font-family: 'IBM Plex Mono', monospace; font-size: .75rem; color: var(--muted); }
  .app { display: flex; height: calc(100vh - 57px); }
  .sidebar { width: 280px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-top { padding: 18px 16px 12px; border-bottom: 1px solid var(--border); }
  .btn-new { width: 100%; padding: 12px; background: var(--accent); color: #0f1117; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem; cursor: pointer; letter-spacing: .03em; transition: opacity .15s; margin-bottom: 8px; }
  .btn-new:hover { opacity: .85; }
  .btn-templates { width: 100%; padding: 10px; background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: .8rem; cursor: pointer; letter-spacing: .03em; transition: color .15s, border-color .15s; }
  .btn-templates:hover { color: var(--text); border-color: var(--text); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
  .fiche-item { padding: 12px 14px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: background .15s, border-color .15s; }
  .fiche-item:hover { background: var(--surface2); }
  .fiche-item.active { background: var(--surface2); border-color: var(--accent); }
  .fiche-item .fi-type { font-weight: 700; font-size: .85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fiche-item .fi-date { font-family: 'IBM Plex Mono', monospace; font-size: .7rem; color: var(--muted); margin-top: 3px; }
  .fiche-item .fi-status { display: inline-block; margin-top: 5px; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 2px 7px; border-radius: 20px; background: var(--border); color: var(--muted); }
  .fiche-item .fi-status.en-cours { background: #1e3a28; color: var(--green); }
  .fiche-item .fi-status.termine { background: #2a1e10; color: var(--accent); }
  .main { flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--bg); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; color: var(--muted); text-align: center; }
  .empty-state .icon { font-size: 3rem; }
  .empty-state h2 { font-size: 1.2rem; color: var(--text); }
  .empty-state p { font-size: .88rem; max-width: 280px; }
  .fiche-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .fiche-title-block { flex: 1; }
  .label-field { font-family: 'IBM Plex Mono', monospace; font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; }
  .fiche-type-input { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; background: none; border: none; border-bottom: 2px solid var(--border); color: var(--text); width: 100%; padding: 4px 0; outline: none; transition: border-color .2s; }
  .fiche-type-input:focus { border-bottom-color: var(--accent); }
  .fiche-type-input::placeholder { color: var(--muted); }
  .fiche-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-input { font-family: 'IBM Plex Mono', monospace; font-size: .8rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 10px; outline: none; transition: border-color .2s; }
  .meta-input:focus { border-color: var(--accent); }
  .status-select { appearance: none; cursor: pointer; }
  .btn-delete { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: .8rem; font-family: 'Syne', sans-serif; transition: border-color .15s, color .15s; }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin-bottom: 20px; }
  .section.process-section { border-color: #2a3a52; }
  .section-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title.process-title { color: var(--blue); }
  .section-title .badge { font-size: .65rem; background: var(--border); color: var(--muted); border-radius: 20px; padding: 2px 8px; }
  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .check-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: 8px; padding: 10px 12px; border: 1px solid transparent; transition: border-color .15s; }
  .check-item:hover { border-color: var(--border); }
  .check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
  .check-item input[type="checkbox"].process-chk { accent-color: var(--blue); }
  .check-item label { flex: 1; font-size: .88rem; cursor: pointer; transition: color .15s; }
  .check-item input[type="checkbox"]:checked + label { text-decoration: line-through; color: var(--muted); }
  .check-item .btn-remove-item { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0 4px; line-height: 1; transition: color .15s; opacity: 0; flex-shrink: 0; }
  .check-item:hover .btn-remove-item { opacity: 1; }
  .check-item .btn-remove-item:hover { color: var(--red); }
  .add-item-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  @media (max-width: 480px) { .add-item-row select, .add-item-row button { width: 100% !important; flex: none !important; } }
  .add-item-input { flex: 1; background: var(--surface2); border: 1px dashed var(--border); color: var(--text); border-radius: 8px; padding: 9px 12px; font-family: 'Syne', sans-serif; font-size: .85rem; outline: none; transition: border-color .2s; }
  .add-item-input:focus { border-color: var(--accent); border-style: solid; }
  .add-item-input::placeholder { color: var(--muted); }
  .btn-add { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); border-radius: 8px; padding: 9px 16px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: background .15s; }
  .btn-add:hover { background: var(--border); }
  .btn-add.process-btn { color: var(--blue); }
  .notes-area { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px 14px; font-family: 'IBM Plex Mono', monospace; font-size: .82rem; line-height: 1.65; resize: vertical; min-height: 100px; outline: none; transition: border-color .2s; }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--muted); }
  .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .calc-grid { grid-template-columns: 1fr; } }
  .calc-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .calc-card label { display: block; font-size: .7rem; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
  .calc-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .calc-input { width: 80px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 10px; font-family: 'IBM Plex Mono', monospace; font-size: .85rem; outline: none; transition: border-color .2s; }
  .calc-input:focus { border-color: var(--accent); }
  .calc-op { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: .9rem; }
  .calc-result { font-family: 'IBM Plex Mono', monospace; font-size: .95rem; font-weight: 500; color: var(--accent); padding: 7px 12px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); min-width: 80px; text-align: right; }
  .calc-unit { font-size: .75rem; color: var(--muted); }
  .calc-hint { margin-top: 8px; font-size: .72rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .save-bar { display: flex; justify-content: flex-end; margin-top: 8px; }
  .btn-save { background: var(--green); color: #0f1117; border: none; border-radius: 8px; padding: 11px 28px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem; cursor: pointer; letter-spacing: .03em; transition: opacity .15s; }
  .btn-save:hover { opacity: .85; }
  .save-msg { font-family: 'IBM Plex Mono', monospace; font-size: .75rem; color: var(--green); align-self: center; margin-right: 12px; opacity: 0; transition: opacity .3s; }
  .save-msg.visible { opacity: 1; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn .15s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--accent); border-radius: 14px; padding: 28px 28px 24px; width: 440px; max-width: 95vw; animation: slideUp .18s; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { font-size: 1.15rem; font-weight: 800; margin-bottom: 6px; color: var(--accent); }
  .modal p { font-size: .85rem; color: var(--muted); margin-bottom: 20px; }
  .modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px 14px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; outline: none; margin-bottom: 20px; transition: border-color .2s; }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 10px 20px; font-family: 'Syne', sans-serif; cursor: pointer; font-size: .875rem; }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-confirm { background: var(--accent); color: #0f1117; border: none; border-radius: 8px; padding: 10px 22px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; font-size: .875rem; transition: opacity .15s; }
  .btn-confirm:hover { opacity: .85; }
</style>
</head>
<body>
<div id="syncBar"></div>
<div id="syncStatus">⟳ Chargement...</div>
<div id="loadingScreen"><div class="spinner"></div><h2>Assistant Chantier</h2><p>Connexion à Google Sheets...</p></div>
<header><h1>⚒ Assistant Chantier</h1><span id="clock"></span></header>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="btn-new" onclick="openNewModal()">+ Nouvelle fiche</button>
      <button class="btn-templates" onclick="openTemplatesPage()">⚙ Gérer les modèles</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>
  <main class="main" id="mainContent">
    <div class="empty-state"><div class="icon">🗂</div><h2>Aucune fiche ouverte</h2><p>Créez une nouvelle fiche pour démarrer.</p></div>
  </main>
</div>
<script>
// --- CONFIGURATION ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmt8oo5fKmgJp2pnnUV8iwNKHyFz992kcGlvkuF7PIIzvrAc4mMaf2cJ4moije36q3/exec"; 

let fiches = [];
let templates = [];
let processModels = [];
let currentId = null;
let saveTimer = null;

function showSync(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg; el.className = type || ''; el.style.opacity = '1';
  if (type === 'ok') setTimeout(() => { el.style.opacity = '0'; }, 2500);
}
function setSyncBar(active) { document.getElementById('syncBar').classList.toggle('active', active); }

function loadFromServer() {
  setSyncBar(true);
  fetch(SCRIPT_URL + "?action=getData")
    .then(res => res.json())
    .then(data => {
      fiches = data.fiches || [];
      templates = data.templates || [];
      processModels = data.processModels || [];
      setSyncBar(false);
      showSync('✓ Données chargées', 'ok');
      document.getElementById('loadingScreen').style.display = 'none';
      renderSidebar();
    })
    .catch(err => {
      console.error(err);
      showSync('✗ Erreur de connexion', 'err');
    });
}

function save() {
  clearTimeout(saveTimer);
  showSync('⟳ Sauvegarde...');
  saveTimer = setTimeout(() => {
    setSyncBar(true);
    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ fiches, templates, processModels })
    })
    .then(res => res.json())
    .then(res => {
      setSyncBar(false);
      if(res.ok) showSync('✓ Synchronisé', 'ok');
    })
    .catch(err => {
      setSyncBar(false);
      showSync('✗ Erreur de sauvegarde', 'err');
    });
  }, 1000);
}

// Les fonctions de ton interface (simplifiées pour tenir ici)
function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = fiches.map(f => `<div class="fiche-item ${f.id === currentId ? 'active' : ''}" onclick="openFiche(${f.id})"><div class="fi-type">${f.type}</div><div class="fi-date">${f.date}</div></div>`).join('');
}
function openFiche(id) {
  currentId = id; const f = fiches.find(x => x.id === id);
  document.getElementById('mainContent').innerHTML = `<div class="section"><h2>${f.type}</h2><textarea class="notes-area" oninput="updateNotes(this.value)">${f.notes || ''}</textarea><button class="btn-new" onclick="save()">Enregistrer</button></div>`;
  renderSidebar();
}
function updateNotes(val) { const f = fiches.find(x => x.id === currentId); if(f) { f.notes = val; save(); } }
function openNewModal() { const name = prompt("Nom client ?"); if(name) { fiches.unshift({id: Date.now(), type: name, date: new Date().toLocaleDateString('fr-FR'), notes: ''}); save(); renderSidebar(); } }

window.onload = loadFromServer;
</script>
</body>
</html>
